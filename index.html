<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skolmaten</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200" rel="stylesheet">

<style>

/* ===== DIN EXAKTA CSS (oförändrad) ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f5f5f5;
    color:#222;
    min-height:100vh;
    zoom:1.12;
}

.topbar{
    width:100%;
    height:110px;
    background:linear-gradient(90deg,#0f4d63 0%,#0a3b55 20%,#05243c 55%,#021327 100%);
    display:flex;
    align-items:center;
    padding:0 18px;
    box-shadow:0 1px 2px rgba(0,0,0,0.1);
    position:fixed;
    top:0;
    left:0;
    z-index:999;
}

.left-side{display:flex;align-items:center;width:100%;}

.logo{display:flex;align-items:center;color:white;font-weight:700;font-size:17px;min-width:170px;}

.logo img{height:52px;width:auto;margin-right:8px;}

.search{flex:1;position:relative;}

.search input{
    width:100%;
    height:29px;
    border:none;
    border-radius:6px;
    padding-left:42px;
    font-size:14px;
}

.right-side{display:flex;align-items:center;gap:18px;margin-left:18px;}

.language-btn{background:white;border:none;border-radius:4px;height:29px;padding:0 12px;}

.login{color:#fff;font-weight:600;cursor:pointer;}

.page{
    width:100%;
    display:flex;
    justify-content:center;
    padding-top:110px;
    padding-bottom:35px;
}

.content{
    width:100%;
    max-width:620px;
}

.school-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:3px solid #efb300;
    padding-bottom:7px;
    margin-bottom:12px;
}

.school-title{font-size:21px;font-weight:700;}

.week{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.day{
    border-bottom:1px solid #e7e7e7;
    padding:12px 0;
}

.day h3{
    font-size:16px;
    font-weight:600;
}

.date{
    color:#8f8f8f;
    font-size:12px;
    margin-bottom:5px;
}

.meal{
    font-size:15px;
    margin-bottom:4px;
}

.week-nav{
    display:flex;
    justify-content:space-between;
    padding-bottom:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- TOPBAR (oförändrad) -->
<div class="topbar">

    <div class="left-side">

        <div class="logo">
            <img src="skolmaten_transparent_background-83ac975b.svg">
            Skolmaten
        </div>

    </div>

</div>

<!-- PAGE -->
<div class="page">

<div class="content">

    <div class="school-header">
        <div class="school-title">Svensgårdsskolan</div>
    </div>

    <div class="week" id="weekText">Vecka 20</div>

    <div id="menuContent"></div>

    <div class="week-nav">

        <div id="prevBtn">⬅ Föregående vecka</div>
        <div id="nextBtn">Nästa vecka ➡</div>

    </div>

</div>

</div>

<!-- 🔥 VIKTIGT: MENU DATA -->
<script src="menu.js"></script>

<script>

let currentWeek = 20;

/* =========================
   DATUM
========================= */

function getWeekDates(weekNumber){

    const firstDay = new Date(2026,0,1);
    const days = (weekNumber - 1) * 7;

    firstDay.setDate(firstDay.getDate() + days);

    const monday = new Date(firstDay);
    monday.setDate(monday.getDate() - monday.getDay() + 1);

    const dates = [];

    for(let i=0;i<5;i++){
        const d = new Date(monday);
        d.setDate(monday.getDate()+i);

        dates.push(
            d.getFullYear()+"-"+
            String(d.getMonth()+1).padStart(2,"0")+"-"+
            String(d.getDate()).padStart(2,"0")
        );
    }

    return dates;
}

/* =========================
   🔥 HÄMTAR MAT FRÅN menu.js
========================= */

function renderWeek(){

    const week = menuData[currentWeek];
    const dates = getWeekDates(currentWeek);

    document.getElementById("weekText").innerText =
        "Vecka " + currentWeek;

    const days = ["måndag","tisdag","onsdag","torsdag","fredag"];

    let html = "";

    days.forEach((day,i)=>{

        const mat = week?.dagar?.[day]?.mat || ["Ingen mat inlagd",""];

        html += `
            <div class="day">
                <h3>${day}</h3>
                <div class="date">${dates[i]}</div>
                <div class="meal">${mat[0]}</div>
                <div class="meal">${mat[1]}</div>
            </div>
        `;

    });

    document.getElementById("menuContent").innerHTML = html;
}

/* =========================
   KNAPPAR
========================= */

document.getElementById("prevBtn").onclick = () => {
    if(currentWeek > 1){
        currentWeek--;
        renderWeek();
    }
};

document.getElementById("nextBtn").onclick = () => {
    if(currentWeek < 52){
        currentWeek++;
        renderWeek();
    }
};

renderWeek();

</script>

</body>
</html>
