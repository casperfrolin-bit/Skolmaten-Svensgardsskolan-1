<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Svensgårdsskolan - Matsedel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f4f5f7;
    color:#222;
}

.topbar{
    background:white;
    border-bottom:1px solid #ddd;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#222;
}

.school-name{
    color:#666;
    font-size:14px;
    margin-top:2px;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.week-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px;
    border-bottom:1px solid #eee;
}

.week-title{
    font-size:28px;
    font-weight:700;
}

.nav-btn{
    background:#00a651;
    border:none;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:0.2s;
}

.nav-btn:hover{
    background:#008c45;
}

.menu{
    padding:10px 25px 30px;
}

.day{
    padding:24px 0;
    border-bottom:1px solid #eee;
}

.day:last-child{
    border-bottom:none;
}

.day-name{
    font-size:20px;
    font-weight:700;
    margin-bottom:8px;
}

.food{
    font-size:17px;
    line-height:1.5;
    color:#444;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#777;
    font-size:14px;
}

@media(max-width:700px){

    .week-nav{
        flex-direction:column;
        gap:15px;
    }

    .week-title{
        font-size:22px;
    }

    .day-name{
        font-size:18px;
    }

}

</style>
</head>
<body>

<div class="topbar">
    <div>
        <div class="logo">Skolmaten</div>
        <div class="school-name">Svensgårdsskolan</div>
    </div>
</div>

<div class="container">

    <div class="card">

        <div class="week-nav">
            <button class="nav-btn" onclick="prevWeek()">← Föregående vecka</button>

            <div class="week-title" id="weekTitle"></div>

            <button class="nav-btn" onclick="nextWeek()">Nästa vecka →</button>
        </div>

        <div class="menu" id="menu"></div>

    </div>

    <div class="footer">
        Matsedelssystem
    </div>

</div>

<script>

const weeks = [];

for(let i = 1; i <= 52; i++){

    weeks.push({
        week: i,
        days: [
            {day:"Måndag", food:"Exempelmat vecka " + i},
            {day:"Tisdag", food:"Exempelmat vecka " + i},
            {day:"Onsdag", food:"Exempelmat vecka " + i},
            {day:"Torsdag", food:"Exempelmat vecka " + i},
            {day:"Fredag", food:"Exempelmat vecka " + i}
        ]
    });

}

weeks[19].days = [
    {day:"Måndag", food:"Köttbullar med potatismos"},
    {day:"Tisdag", food:"Pasta Carbonara"},
    {day:"Onsdag", food:"Kycklinggryta med ris"},
    {day:"Torsdag", food:"Pannkakor med sylt"},
    {day:"Fredag", food:"Tacos"}
];

let currentWeek = 19;

function renderWeek(){

    document.getElementById("weekTitle").innerText =
        "Vecka " + weeks[currentWeek].week;

    const menu = document.getElementById("menu");

    menu.innerHTML = "";

    weeks[currentWeek].days.forEach(item => {

        menu.innerHTML += `
            <div class="day">
                <div class="day-name">${item.day}</div>
                <div class="food">${item.food}</div>
            </div>
        `;

    });

}

function nextWeek(){

    if(currentWeek < 51){
        currentWeek++;
        renderWeek();
    }

}

function prevWeek(){

    if(currentWeek > 0){
        currentWeek--;
        renderWeek();
    }

}

renderWeek();

</script>

</body>
</html>
