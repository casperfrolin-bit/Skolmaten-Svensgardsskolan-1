<style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
  }

  body{
    background:#ffffff;
    color:#222;
  }

  /* =========================
     TOPBAR
  ========================== */

  .topbar{
    background:#001d38;
    height:100px;
    width:100%;
    display:flex;
    align-items:center;
    padding:0 28px;
    color:white;
  }

  .logo{
    font-size:24px;
    font-weight:bold;
    margin-right:25px;
  }

  /* SEARCH */

  .search{
    width:420px; /* SMALARE */
    position:relative;
  }

  .search input{
    width:100%;
    height:44px;
    border:none;
    border-radius:6px;
    padding-left:48px;
    font-size:15px;
    outline:none;
  }

  .search .material-icons{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#666;
    font-size:22px;
  }

  /* RIGHT SIDE */

  .top-right{
    display:flex;
    align-items:center;
    gap:16px;
    margin-left:auto;
  }

  /* LANGUAGE */

  .language-box{
    position:relative;
  }

  .language-btn{
    background:white;
    border:none;
    border-radius:5px;
    width:125px; /* SMALARE */
    height:42px;
    padding:0 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    font-size:15px;
  }

  .language-left{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .flag{
    width:22px;
    height:15px;
    background:
    linear-gradient(to right,
    #005293 35%,
    #FECB00 35%,
    #FECB00 45%,
    #005293 45%),
    linear-gradient(to bottom,
    #005293 40%,
    #FECB00 40%,
    #FECB00 55%,
    #005293 55%);
  }

  .dropdown{
    position:absolute;
    top:48px;
    left:0;
    width:140px;
    background:white;
    border-radius:6px;
    overflow:hidden;
    display:none;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
  }

  .dropdown div{
    padding:12px;
    color:#222;
    cursor:pointer;
    font-size:15px;
  }

  .dropdown div:hover{
    background:#f2f2f2;
  }

  .language-box:hover .dropdown{
    display:block;
  }

  /* LOGIN */

  .login{
    font-size:20px; /* STÖRRE */
    font-weight:bold;
    cursor:pointer;
  }

  /* =========================
     CONTENT
  ========================== */

  .container{
    width:700px;
    margin:60px auto;
  }

  /* HELSINGBORG */

  .city-link{
    color:#1b6d8c;
    font-size:18px;
    margin-bottom:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
  }

  .city-link .material-icons{
    font-size:34px; /* STÖRRE < */
  }

  /* SCHOOL */

  .school-name{
    font-size:38px;
    font-weight:bold;
    padding-bottom:12px;
    border-bottom:5px solid #f0b400;
    margin-bottom:18px;
  }

  .week{
    font-size:30px;
    font-weight:bold;
    margin-bottom:35px;
  }

  /* DAYS */

  .day{
    border-bottom:1px solid #ddd;
    padding-bottom:24px;
    margin-bottom:24px;
  }

  .day h3{
    font-size:24px;
    margin-bottom:7px;
  }

  .date{
    color:#888;
    font-size:16px;
    margin-bottom:14px;
  }

  .meal{
    font-size:15px; /* MINDRE */
    line-height:1.7;
    margin-bottom:8px;
  }

  /* FOOTER */

  .footer-text{
    margin-top:35px;
    color:#4e7b88;
    font-size:15px;
    line-height:1.7;
  }

  /* WEEK NAVIGATION */

  .week-nav{
    display:flex;
    justify-content:space-between;
    margin-top:45px;
    color:#1f6f8e;
    font-size:18px;
  }

  .week-link{
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
  }

  .week-link .material-icons{
    font-size:26px;
  }

</style>

<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">Skolmaten</div>

    <!-- SEARCH -->

    <div class="search">
      <span class="material-icons">search</span>
      <input type="text" placeholder="Sök">
    </div>

    <!-- RIGHT -->

    <div class="top-right">

      <!-- LANGUAGE -->

      <div class="language-box">

        <button class="language-btn">

          <div class="language-left">

            <div class="flag"></div>

            Svenska

          </div>

          <span class="material-icons" style="font-size:20px;color:#444;">
            arrow_drop_down
          </span>

        </button>

        <div class="dropdown">
          <div>Svenska</div>
          <div>English</div>
          <div>Deutsch</div>
        </div>

      </div>

      <!-- LOGIN -->

      <div class="login">
        Logga in
      </div>

    </div>

  </div>

  <!-- CONTENT -->

  <div class="container">

    <!-- HELSINGBORG -->

    <div class="city-link">

      <span class="material-icons">
        chevron_left
      </span>

      Helsingborg Stad

    </div>

    <!-- SCHOOL -->

    <div class="school-name">
      Svensgårdsskolan
    </div>

    <!-- WEEK -->

    <div class="week">
      Vecka 19
    </div>

    <!-- MONDAY -->

    <div class="day">

      <h3>Måndag</h3>

      <div class="date">2026-05-04</div>

      <div class="meal">
        Fiskpinnar, serveras med remouladsås,
        kokt potatis och grönsaksbuffé
      </div>

      <div class="meal">
        Couscoussnitzel serveras med rostad potatis,
        sås och grönsaksbuffé
      </div>

    </div>

  </div>

</body>
