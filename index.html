<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skolmaten</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f5f5f5;
    color:#222;
    min-height:100vh;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    width:100%;
    height:80px;

    background:linear-gradient(90deg,#0f4d63,#05243c,#021327);

    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;

    position:fixed;
    top:0;
    left:0;
    z-index:999;
}

/* LEFT */

.left-side{
    display:flex;
    align-items:center;
    gap:25px;
    width:100%;
}

/* LOGO */

.logo{
    display:flex;
    align-items:center;
    color:white;
    font-weight:700;
    font-size:17px;
    min-width:170px;
}

.logo img{
    height:42px;
    margin-right:8px;
}

/* SEARCH */

.search{
    flex:1;
    position:relative;
}

.search input{
    width:100%;
    height:34px;
    border:none;
    border-radius:6px;
    padding-left:42px;
    font-size:14px;
    background:#f2f2f2;
    outline:none;
}

.search .material-symbols-outlined{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

/* RIGHT */

.right-side{
    display:flex;
    align-items:center;
    gap:18px;
}

.login{
    color:white;
    font-weight:600;
}

/* =========================
   PAGE
========================= */

.page{
    width:100%;
    display:flex;
    justify-content:center;

    /* FLYTTAR NER MATSIDAN */
    padding-top:150px;

    /* MINDRE AVSTÅND TILL BOTTEN */
    padding-bottom:30px;
}

.content{
    width:100%;
    max-width:620px;
}

/* TOP INFO */

.top-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:16px;
    color:#555;
    font-size:14px;
}

/* SCHOOL */

.school-header{
    display:flex;
    justify-content:space-between;
    border-bottom:3px solid #efb300;
    padding-bottom:8px;
    margin-bottom:18px;
}

.school-title{
    font-size:30px;
    font-weight:700;
}

/* WEEK */

.week{
    font-size:24px;
    font-weight:600;
    margin-bottom:14px;
}

/* DAYS */

.day{
    border-bottom:1px solid #e7e7e7;
    padding:14px 0;
}

.day h3{
    font-size:18px;
    font-weight:700;
    margin-bottom:3px;
}

.date{
    font-size:12px;
    color:#888;
    margin-bottom:8px;
}

.meal{
    font-size:15px;
    line-height:1.7;
}

/* NAV */

.week-nav{
    display:flex;
    justify-content:space-between;
    margin-top:24px;
    cursor:pointer;
    font-size:15px;
}

/* FOOTER */

.bottom-footer{
    margin-top:30px;
    padding:30px;
    background:linear-gradient(90deg,#0f4d63,#021327);
    color:white;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="left-side">

        <div class="logo">
            <img src="skolmaten_transparent_background-83ac975b.svg">
            Skolmaten
        </div>

        <div class="search">
            <span class="material-symbols-outlined">search</span>
            <input type="text" placeholder="Sök">
        </div>

    </div>

    <div class="right-side">
        <div class="login">Logga in</div>
    </div>

</div>

<!-- PAGE -->

<div class="page">

<div class="content">

    <div class="top-info">
        <div>Helsingborgs stad</div>
    </div>

    <div class="school-header">
        <div class="school-title">Svensgårdsskolan</div>
    </div>

    <div class="week" id="weekText">Vecka 20</div>

    <div id="menuContent"></div>

    <div class="week-nav">
        <div id="prevBtn">⬅ Föregående vecka</div>
        <div id="nextBtn">Nästa vecka ➡</div>
    </div>

</div>

</div>

<!-- FOOTER -->

<div class="bottom-footer">
    Vi strävar efter att erbjuda god och näringsrik mat varje dag.
</div>

<script>

/* =========================
   MENYDATA
========================= */

const menuData = {

20: {
dagar: {

måndag: {
mat: [
"Kattmat med bajs",
"Andra alternativet"
]
},

tisdag: {
mat: [
"Pannkakor",
"Vegetarisk pannkaka"
]
},

onsdag: {
mat: [
"Hamburgare",
"Vegoburgare"
]
},

torsdag: {
mat: [
"KRISTIHIMMELSFÄRD"
]
},

fredag: {
mat: [
"KLÄMDAG"
]
}

}
}

};

/* =========================
   VECKA
========================= */

let currentWeek = 20;

/* =========================
   DATUM
========================= */

function getWeekDates(week){

    const start = new Date(2026,0,1);

    start.setDate(start.getDate() + (week - 1) * 7);

    start.setDate(start.getDate() - start.getDay() + 1);

    let d = [];

    for(let i = 0; i < 5; i++){

        let x = new Date(start);

        x.setDate(start.getDate() + i);

        d.push(x.toISOString().split("T")[0]);
    }

    return d;
}

/* =========================
   HÄMTA MAT
========================= */

function getMeals(week, day){

    if(
        menuData[week] &&
        menuData[week].dagar &&
        menuData[week].dagar[day]
    ){
        return menuData[week].dagar[day].mat;
    }

    return ["Ingen mat registrerad"];
}

/* =========================
   RENDER
========================= */

function renderWeek(){

    document.getElementById("weekText").innerText =
        "Vecka " + currentWeek;

    const dates = getWeekDates(currentWeek);

    const dagar = [
        ["Måndag","måndag"],
        ["Tisdag","tisdag"],
        ["Onsdag","onsdag"],
        ["Torsdag","torsdag"],
        ["Fredag","fredag"]
    ];

    let html = "";

    dagar.forEach((dag, index) => {

        const meals = getMeals(currentWeek, dag[1]);

        html += `
        <div class="day">

            <h3>${dag[0]}</h3>

            <div class="date">
                ${dates[index]}
            </div>

            <div class="meal">
                ${meals
                    .filter(m => m.trim() !== "")
                    .map(m => `<div>${m}</div>`)
                    .join("")
                }
            </div>

        </div>
        `;
    });

    document.getElementById("menuContent").innerHTML = html;
}

/* =========================
   BUTTONS
========================= */

document.getElementById("prevBtn").onclick = () => {

    if(currentWeek > 1){
        currentWeek--;
        renderWeek();
    }
};

document.getElementById("nextBtn").onclick = () => {

    if(currentWeek < 52){
        currentWeek++;
        renderWeek();
    }
};

renderWeek();

</script>

</body>
</html>
