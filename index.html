<style>

/* ===== ALL DIN CSS (HELT OFÖRÄNDRAD) ===== */

</div>

<!-- PAGE -->

<div class="content">

    <div class="top-info">

        <div class="city-link">
            <span class="material-symbols-outlined">chevron_left</span>

        </div>

        <div class="header-icons">
            <span class="material-symbols-outlined">print</span>
            <span class="material-symbols-outlined">rss_feed</span>

    </div>

    <!-- SCHOOL -->

    <!-- WEEK -->

</div>

        <a href="#">Information</a>

        <a href="#">API</a>
        <a href="#">Kontakta oss</a>
    </div>

    <div class="footer-column">
        <h3>Appar</h3>
        <a href="#">iOS</a>
        <a href="#">Android</a>
    </div>

    <div class="footer-column">
        <h3>Administration</h3>
        <a href="#">Logga in</a>
    </div>

</div>

<!-- 🔥 MENU DATA -->
<script src="menu.js"></script>

<script>

let currentWeek = 20;

/* DATUM */
function getWeekDates(weekNumber){

    const firstDay = new Date(2026,0,1);
    const days = (weekNumber - 1) * 7;

    firstDay.setDate(firstDay.getDate() + days);

    const monday = new Date(firstDay);
    monday.setDate(monday.getDate() - monday.getDay() + 1);

    const dates = [];

    for(let i=0;i<5;i++){
        const d = new Date(monday);
        d.setDate(monday.getDate()+i);

        dates.push(
            d.getFullYear()+"-"+
            String(d.getMonth()+1).padStart(2,"0")+"-"+
            String(d.getDate()).padStart(2,"0")
        );
    }

    return dates;
}

/* MAT FRÅN menu.js */
function renderWeek(){

    const week = menuData[currentWeek];
    const dates = getWeekDates(currentWeek);

    document.getElementById("weekText").innerText =
        "Vecka " + currentWeek;

    const days = ["måndag","tisdag","onsdag","torsdag","fredag"];

    let html = "";

    days.forEach((day,i)=>{

        const mat = week?.dagar?.[day]?.mat || ["Ingen mat",""];

        html += `
            <div class="day">
                <h3>${day}</h3>
                <div class="date">${dates[i]}</div>
                <div class="meal">${mat[0]}</div>
                <div class="meal">${mat[1]}</div>
            </div>
        `;

    });

    document.getElementById("menuContent").innerHTML = html;
}

/* KNAPPAR */
document.getElementById("prevBtn").onclick = () => {
    if(currentWeek > 1){
        currentWeek--;
        renderWeek();
    }
};

document.getElementById("nextBtn").onclick = () => {
    if(currentWeek < 52){
        currentWeek++;
        renderWeek();
    }
};

renderWeek();

</script>

</body>
</html>
