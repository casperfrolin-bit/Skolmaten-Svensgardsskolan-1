<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skolmaten</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f5f5f5;
    color:#222;
    min-height:100vh;
    zoom:1.12;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    width:100%;
    height:110px;

    background:linear-gradient(90deg,#0f4d63,#05243c,#021327);

    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;

    position:fixed;
    top:0;
    left:0;
    z-index:999;
}

/* LEFT */
.left-side{
    display:flex;
    align-items:center;
    gap:25px;
    width:100%;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    color:white;
    font-weight:700;
    font-size:17px;
    min-width:170px;
}

.logo img{
    height:52px;
    margin-right:8px;
}

/* 🔥 FIX: STOR SÖKBAR */
.search{
    flex:1;
    max-width:none;
    width:100%;
    position:relative;
}

.search input{
    width:100%;
    height:34px;
    border:none;
    border-radius:6px;
    padding-left:42px;
    font-size:14px;
    background:#f2f2f2;
    outline:none;
}

.search .material-symbols-outlined{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

/* RIGHT */
.right-side{
    display:flex;
    align-items:center;
    gap:18px;
}

.login{
    color:white;
    font-weight:600;
}

/* =========================
   PAGE
========================= */

.page{
    width:100%;
    display:flex;
    justify-content:center;
    padding-top:110px;
}

.content{
    width:100%;
    max-width:620px;
}

/* TOP */

.top-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
}

/* SCHOOL */

.school-header{
    display:flex;
    justify-content:space-between;
    border-bottom:3px solid #efb300;
    padding-bottom:7px;
    margin-bottom:12px;
}

.school-title{
    font-size:21px;
    font-weight:700;
}

/* WEEK */

.week{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

/* DAYS */

.day{
    border-bottom:1px solid #e7e7e7;
    padding:12px 0;
}

.day h3{
    font-size:16px;
    font-weight:600;
}

.date{
    font-size:12px;
    color:#888;
}

.meal{
    font-size:15px;
    margin-top:4px;
}

/* NAV */

.week-nav{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    cursor:pointer;
}

/* FOOTER */

.bottom-footer{
    margin-top:40px;
    padding:40px;
    background:linear-gradient(90deg,#0f4d63,#021327);
    color:white;
}

</style>
</head>

<body>

<div class="topbar">

    <div class="left-side">

        <div class="logo">
            <img src="skolmaten_transparent_background-83ac975b.svg">
            Skolmaten
        </div>

        <div class="search">
            <span class="material-symbols-outlined">search</span>
            <input type="text" placeholder="Sök">
        </div>

    </div>

    <div class="right-side">
        <div class="login">Logga in</div>
    </div>

</div>

<div class="page">

<div class="content">

    <div class="top-info">
        <div>Helsingborgs stad</div>
    </div>

    <div class="school-header">
        <div class="school-title">Svensgårdsskolan</div>
    </div>

    <div class="week" id="weekText">Vecka 20</div>

    <div id="menuContent"></div>

    <div class="week-nav">
        <div id="prevBtn">⬅ Föregående</div>
        <div id="nextBtn">Nästa ➡</div>
    </div>

</div>

</div>

<script>
let currentWeek = 20;

/* ===== DATUM ===== */
function getWeekDates(week){

    const start = new Date(2026,0,1);
    start.setDate(start.getDate() + (week-1)*7);
    start.setDate(start.getDate() - start.getDay() + 1);

    let d = [];

    for(let i=0;i<5;i++){
        let x = new Date(start);
        x.setDate(start.getDate()+i);

        d.push(x.toISOString().split("T")[0]);
    }

    return d;
}

/* ===== DATA (fallback om menu.js saknas) ===== */
const fallbackMenu = {
    20:{
        monday:"Pasta Bolognese på svensk köttråvara, samt grönsaksbuffé
Färssås med pasta samt grönsaksbuffé",
        tuesday:"Sopor",
        wednesday:"Pulled pork på svensk köttråvara serveras med bröd, klyftpotatis och dressing samt grönsaksbuffé
Pulled BBQ med bulgur och dressing samt grönsaksbuffé",
        thursday:"KRISTIHIMMELSFÄRD",
        friday:"KLÄMDAG"
    }
};

/* ===== RENDER ===== */
function renderWeek(){

    document.getElementById("weekText").innerText = "Vecka " + currentWeek;

    const dates = getWeekDates(currentWeek);

    const data = (window.menu && menu[currentWeek]) ? menu[currentWeek] : fallbackMenu[currentWeek];

    document.getElementById("menuContent").innerHTML = `
        <div class="day"><h3>Måndag</h3><div class="date">${dates[0]}</div><div class="meal">${data?.monday || ""}</div></div>
        <div class="day"><h3>Tisdag</h3><div class="date">${dates[1]}</div><div class="meal">${data?.tuesday || ""}</div></div>
        <div class="day"><h3>Onsdag</h3><div class="date">${dates[2]}</div><div class="meal">${data?.wednesday || ""}</div></div>
        <div class="day"><h3>Torsdag</h3><div class="date">${dates[3]}</div><div class="meal">${data?.thursday || ""}</div></div>
        <div class="day"><h3>Fredag</h3><div class="date">${dates[4]}</div><div class="meal">${data?.friday || ""}</div></div>
    `;
}

document.getElementById("prevBtn").onclick = () => {
    currentWeek--;
    renderWeek();
};

document.getElementById("nextBtn").onclick = () => {
    currentWeek++;
    renderWeek();
};

renderWeek();

</script>

</body>
</html>
