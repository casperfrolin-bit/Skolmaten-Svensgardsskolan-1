<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skolmaten</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400;500" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{

    font-family:"Segoe UI", Arial, sans-serif;

    background:#FFFFFF;
    color:#222;

    zoom:1.14;

    overflow-y:auto;
}

/* =========================
   LINKS / HOVER
========================= */

.hover-link{

    transition:0.15s;
    cursor:pointer;
}

.hover-link:hover{

    color:#2d87aa;
}

/* =========================
   TOPBAR
========================= */

.topbar{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:110px;

    background:linear-gradient(
        90deg,
        #0b374a 0%,
        #0b374a 68%,
        #020618 100%
    );

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 18px;

    z-index:999;
}

/* =========================
   LEFT
========================= */

.left-side{

    display:flex;
    align-items:center;

    gap:24px;

    width:100%;
}

/* =========================
   LOGO
========================= */

.logo{

    display:flex;
    align-items:center;

    color:white;

    font-size:16px;
    font-weight:700;

    min-width:155px;
}

.logo img{

    height:40px;

    margin-right:8px;
}

/* =========================
   SEARCH
========================= */

.search{

    width:100%;
    max-width:none;

    position:relative;
}

.search input{

    width:100%;
    height:39px;

    border:none;
    border-radius:5px;

    background:#f2f2f2;

    padding-left:40px;
    padding-right:10px;

    outline:none;

    font-size:13px;
}

.search .material-symbols-outlined{

    position:absolute;

    left:11px;
    top:50%;

    transform:translateY(-50%);

    font-size:19px;

    color:#777;
}

/* =========================
   RIGHT
========================= */

.right-side{

    display:flex;
    align-items:center;

    gap:14px;

    margin-left:18px;
}

/* =========================
   LANGUAGE
========================= */

.language{

    display:flex;
    align-items:center;

    gap:7px;

    height:39px;

    background:#f2f2f2;

    padding:0 11px;

    border-radius:5px;

    color:#222;

    font-size:13px;

    cursor:pointer;

    white-space:nowrap;
}

/* =========================
   SWEDISH FLAG
========================= */

.flag{

    width:18px;
    height:12px;

    border-radius:2px;

    overflow:hidden;
}

.sweden-flag{

    position:relative;

    width:18px;
    height:12px;

    background:#006aa7;

    border-radius:2px;

    overflow:hidden;
}

.sweden-flag::before{

    content:"";

    position:absolute;

    left:5px;
    top:0;

    width:2px;
    height:100%;

    background:#fecc00;
}

.sweden-flag::after{

    content:"";

    position:absolute;

    left:0;
    top:5px;

    width:100%;
    height:2px;

    background:#fecc00;
}

/* LANGUAGE ARROW */

.language-arrow{

    font-size:12px;

    color:#666;

    margin-left:2px;

    transform:translateY(-1px);
}

/* =========================
   LOGIN
========================= */

.login{

    color:white;

    font-size:14px;
    font-weight:600;

    white-space:nowrap;

    cursor:pointer;
}

/* =========================
   PAGE
========================= */

.page{

    width:100%;

    display:flex;
    justify-content:center;

    padding-top:150px;

    padding-bottom:90px;
}

/* =========================
   CONTENT
========================= */

.content{

    width:100%;

    max-width:610px;
}

/* =========================
   TOP INFO
========================= */

.top-info{

    display:flex;
    align-items:center;

    gap:5px;

    margin-bottom:10px;

    color:#222;

    font-size:15px;

    font-weight:500;
}

/* PILEN I BÖRJAN */

.top-info-arrow{

    font-size:22px;

    color:#2d87aa;

    line-height:1;

    font-weight:500;

    transform:translateY(-1px);
}

/* =========================
   SCHOOL HEADER
========================= */

.school-header{

    display:flex;
    justify-content:space-between;
    align-items:flex-end;

    border-bottom:3px solid #efb300;

    padding-bottom:0px;

    margin-bottom:12px;
}

/* SCHOOL TITLE */

.school-title{

    font-size:24px;

    font-weight:700;

    line-height:1;

    padding-bottom:6px;
}

/* =========================
   RIGHT
========================= */

.school-right{

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:8px;
}

/* =========================
   ICONS
========================= */

.top-icons{

    display:flex;
    gap:12px;
}

/* TUNNARE IKONER */

.top-icon{

    font-size:21px !important;

    font-variation-settings:
        'FILL' 0,
        'wght' 180,
        'GRAD' -25,
        'opsz' 24;

    color:#2d87aa;

    cursor:pointer;

    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
}

/* =========================
   CITY LOGO
========================= */

.city-logo{

    width:36px;
    height:36px;

    border-radius:50%;

    overflow:hidden;

    border:1px solid #d8d8d8;

    background:white;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* HELA CIRKELN FYLLS */

.city-logo img{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* =========================
   WEEK
========================= */

.week{

    font-size:21px;
    font-weight:600;

    margin-bottom:4px;
}

/* =========================
   DAY
========================= */

.day{

    border-bottom:1px solid #e5e5e5;

    padding:13px 0;
}

.day h3{

    font-size:17px;
    font-weight:600;

    margin-bottom:2px;
}

.date{

    font-size:12px;

    color:#888;

    margin-bottom:5px;
}

.meal{

    font-size:14px;

    line-height:1.55;
}

.meal div{

    margin-bottom:1px;
}

/* =========================
   INFO TEXT
========================= */

.menu-info{

    margin-top:24px;
    margin-bottom:15px;

    color:#2d87aa;

    font-size:14px;

    line-height:1.5;

    cursor:pointer;
}

.menu-info-top{

    display:flex;
    align-items:flex-start;

    gap:8px;
}

/* LINK ICON */

.menu-link-icon{

    font-size:18px;

    color:#2d87aa;

    margin-top:1px;
}

/* =========================
   NAV
========================= */

.week-nav{

    display:flex;
    justify-content:space-between;

    margin-top:8px;

    font-size:15px;
}

.week-button{

    display:flex;
    align-items:center;

    gap:7px;

    color:#222;

    cursor:pointer;

    transition:0.15s;
}

.week-button:hover{

    color:#2d87aa;
}

/* ARROWS */

.week-arrow{

    font-size:28px;

    color:#2d87aa;

    line-height:1;
}

/* =========================
   FOOTER
========================= */

.footer{

    width:100%;

    background:linear-gradient(
        90deg,
        #0b374a 0%,
        #0b374a 68%,
        #020618 100%
    );

    color:white;

    padding:28px 140px;

    display:flex;
    justify-content:space-between;

    margin-top:70px;
}

/* COLUMN */

.footer-column{

    display:flex;
    flex-direction:column;

    gap:6px;
}

.footer-title{

    color:#efb300;

    font-size:14px;
    font-weight:700;

    margin-bottom:6px;
}

.footer-column a{

    color:white;

    text-decoration:none;

    font-size:14px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

    body{
        zoom:1;
    }

    .content{
        padding:0 14px;
    }

    .footer{

        flex-direction:column;

        gap:30px;

        padding:28px 30px;
    }

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="left-side">

        <div class="logo">

            <img src="skolmaten_transparent_background-83ac975b.svg">

            Skolmaten

        </div>

        <div class="search">

            <span class="material-symbols-outlined">
                search
            </span>

            <input type="text" placeholder="Sök">

        </div>

    </div>

    <div class="right-side">

        <!-- LANGUAGE -->

        <div class="language">

            <div class="flag sweden-flag"></div>

            Svenska

            <span class="language-arrow">
                ▼
            </span>

        </div>

        <!-- LOGIN -->

        <div class="login">
            Logga in
        </div>

    </div>

</div>

<!-- PAGE -->

<div class="page">

<div class="content">

    <div class="top-info hover-link">

        <span class="top-info-arrow">
            ‹
        </span>

        Helsingborgs stad

    </div>

    <div class="school-header">

        <div class="school-title">
            Svensgårdsskolan
        </div>

        <div class="school-right">

            <div class="top-icons">

                <span class="material-symbols-outlined top-icon">
                    print
                </span>

                <span class="material-symbols-outlined top-icon">
                    rss_feed
                </span>

            </div>

            <div class="city-logo">

                <img src="nedladdning (4).png" alt="Helsingborg">

            </div>

        </div>

    </div>

    <div class="week">
        Vecka 20
    </div>

</div>

</div>

</body>
</html>
