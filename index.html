<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skolmaten</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:#f5f5f5;
    color:#222;
    min-height:100vh;
    zoom:1.12;
}

/* =========================
   TOPBAR
========================= */

.topbar{
    width:100%;
    height:110px;

    background:
    linear-gradient(
        90deg,
        #0f4d63 0%,
        #0a3b55 20%,
        #05243c 55%,
        #021327 100%
    );

    display:flex;
    align-items:center;
    padding:0 18px;
    box-shadow:0 1px 2px rgba(0,0,0,0.1);

    position:fixed;
    top:0;
    left:0;
    z-index:999;
}

.left-side{
    display:flex;
    align-items:center;
    width:100%;
}

.logo{
    display:flex;
    align-items:center;
    color:white;
    font-weight:700;
    font-size:17px;
    min-width:170px;
}

.logo img{
    height:52px;
    width:auto;
    object-fit:contain;
    margin-right:8px;
    display:block;
}

.search{
    flex:1;
    position:relative;
}

.search input{
    width:100%;
    height:29px;
    border:none;
    border-radius:6px;
    padding-left:42px;
    font-size:14px;
    outline:none;
    background:#f2f2f2;
}

.search .material-symbols-outlined{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
    font-size:22px;
}

.right-side{
    display:flex;
    align-items:center;
    gap:18px;
    margin-left:18px;
}

.language-btn{
    background:white;
    border:none;
    border-radius:4px;
    height:29px;
    padding:0 12px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    font-size:14px;
}

.flag{
    width:22px;
    height:15px;
    background:#006AA7;
    position:relative;
    border-radius:1px;
    overflow:hidden;
}

.flag::before{
    content:"";
    position:absolute;
    left:30%;
    top:0;
    width:3px;
    height:100%;
    background:#FECC00;
}

.flag::after{
    content:"";
    position:absolute;
    left:0;
    top:40%;
    width:100%;
    height:3px;
    background:#FECC00;
}

.login{
    color:#FFFFFF;
    font-size:14px;
    font-weight:600;
}

.page{
    width:100%;
    display:flex;
    justify-content:center;
    padding-top:150px;
    padding-bottom:35px;
}

.content{
    width:100%;
    max-width:620px;
}

.school-header{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:3px solid #efb300;
    padding-bottom:7px;
    margin-bottom:12px;
}

.school-title{
    font-size:21px;
    font-weight:700;
}

.school-badge{
    width:38px;
    height:38px;
    border-radius:50%;
    overflow:hidden;
    background:#16386a;
}

.school-badge img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.week{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.day{
    border-bottom:1px solid #e7e7e7;
    padding:12px 0;
}

.day h3{
    font-size:16px;
    margin-bottom:3px;
    font-weight:600;
}

.date{
    color:#8f8f8f;
    font-size:12px;
    margin-bottom:5px;
}

.meal{
    font-size:15px;
    line-height:1.5;
    margin-bottom:4px;
}

.week-nav{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    padding-bottom:20px;
}

.week-link{
    display:flex;
    align-items:center;
    gap:6px;
    color:#000000;
    cursor:pointer;
    font-size:15px;
    font-weight:500;
}

.week-link .material-symbols-outlined{
    font-size:28px;
    color:#2d6e93;
}

</style>
</head>
<body>

<div class="topbar">

    <div class="left-side">

        <div class="logo">

            <img src="skolmaten_transparent_background-83ac975b.svg">

            Skolmaten

        </div>

        <div class="search">

            <span class="material-symbols-outlined">
                search
            </span>

            <input type="text" placeholder="Sök">

        </div>

        <div class="right-side">

            <button class="language-btn">

                <div class="flag"></div>

                Svenska

            </button>

            <div class="login">
                Logga in
            </div>

        </div>

    </div>

</div>

<div class="page">

    <div class="content">

        <div class="school-header">

            <div class="school-title">
                Svensgårdsskolan
            </div>

            <div class="school-badge">
                <img src="nedladdning (4).png">
            </div>

        </div>

        <div class="week" id="weekTitle">
            Vecka 20
        </div>

        <div id="menuContainer"></div>

        <div class="week-nav">

            <div class="week-link" id="prevWeek">

                <span class="material-symbols-outlined">
                    chevron_left
                </span>

                Föregående vecka

            </div>

            <div class="week-link" id="nextWeek">

                Nästa vecka

                <span class="material-symbols-outlined">
                    chevron_right
                </span>

            </div>

        </div>

    </div>

</div>

<script>

/* =========================
   VECKOR
========================= */

const weeks = {

    20: {
        monday: "2026-05-11",
        tuesday: "2026-05-12",
        wednesday: "2026-05-13",
        thursday: "2026-05-14",
        friday: "2026-05-15"
    },

    21: {
        monday: "2026-05-18",
        tuesday: "2026-05-19",
        wednesday: "2026-05-20",
        thursday: "2026-05-21",
        friday: "2026-05-22"
    },

    22: {
        monday: "2026-05-25",
        tuesday: "2026-05-26",
        wednesday: "2026-05-27",
        thursday: "2026-05-28",
        friday: "2026-05-29"
    }

};

/* =========================
   AKTUELL VECKA
========================= */

let currentWeek = 20;

/* =========================
   RENDER
========================= */

function renderWeek(){

    document.getElementById("weekTitle").innerText =
        "Vecka " + currentWeek;

    const week = weeks[currentWeek];

    const container = document.getElementById("menuContainer");

    container.innerHTML = `

        <div class="day">

            <h3>Måndag</h3>

            <div class="date">${week.monday}</div>

            <div class="meal">
                Samma mat här senare
            </div>

        </div>

        <div class="day">

            <h3>Tisdag</h3>

            <div class="date">${week.tuesday}</div>

            <div class="meal">
                Samma mat här senare
            </div>

        </div>

        <div class="day">

            <h3>Onsdag</h3>

            <div class="date">${week.wednesday}</div>

            <div class="meal">
                Samma mat här senare
            </div>

        </div>

        <div class="day">

            <h3>Torsdag</h3>

            <div class="date">${week.thursday}</div>

            <div class="meal">
                Samma mat här senare
            </div>

        </div>

        <div class="day">

            <h3>Fredag</h3>

            <div class="date">${week.friday}</div>

            <div class="meal">
                Samma mat här senare
            </div>

        </div>

    `;

}

/* =========================
   KNAPPAR
========================= */

document.getElementById("prevWeek").onclick = () => {

    if(currentWeek > 20){

        currentWeek--;

        renderWeek();

    }

};

document.getElementById("nextWeek").onclick = () => {

    if(currentWeek < 22){

        currentWeek++;

        renderWeek();

    }

};

/* =========================
   START
========================= */

renderWeek();

</script>

</body>
</html>
